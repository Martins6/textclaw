[container]
image = "textclaw/agent:latest"
volumes = [
    "./workspaces/{workspace}:/home/{user}:rw",
    "~/.textclaw/opencode-config:/home/{user}/.config/opencode:ro",
]

[workspace]
base_path = "./workspaces"

# Telegram configuration
# allowed_users: List of allowed Telegram handles (without @).
# Leave empty to allow everyone, or specify users like ["user1", "user2"]
[telegram]
# token = "YOUR_BOT_TOKEN"  # Set via: textclaw config set telegram.token "YOUR_TOKEN"
allowed_users = []

# Main user (admin) configuration
# The main user gets access to ~/.textclaw as their workspace
[main]
enabled = false
# telegram_id = "your_telegram_username"
agent = "build"
provider = "minimax"
model = "MiniMax-M2.5"
